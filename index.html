<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ma Carte de Terrain - Tanger</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/papaparse/5.4.1/papaparse.min.js"></script>

    <style>
        body { margin: 0; padding: 0; }
        #map { height: 100vh; width: 100vw; }
        .version-tag {
            position: absolute; bottom: 10px; left: 10px; z-index: 1000;
            background: white; padding: 2px 5px; font-size: 10px; border-radius: 3px;
        }
    </style>
</head>
<body>

    <div id="map"></div>
    <div class="version-tag">Build 1.2.5 - CSV Active</div>

    <script>
        // --- CONFIGURATION DE LA CARTE ---
        // On centre la carte sur Tanger par défaut
        var map = L.map('map').setView([35.7595, -5.8340], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // --- LECTURE DU FICHIER CSV ---
        function chargerPointsCSV() {
            Papa.parse("points.csv", {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    console.log("Données chargées :", results.data);
                    
                    results.data.forEach(function(p) {
                        // On accepte Lat/Lon ou lat/lng pour éviter les erreurs
                        var latitude = parseFloat(p.Lat || p.lat);
                        var longitude = parseFloat(p.Lon || p.lng || p.long);
                        var nomSite = p.site || p.nom || "Point sans nom";

                        if (!isNaN(latitude) && !isNaN(longitude)) {
                            // Création du marqueur bleu
                            L.circleMarker([latitude, longitude], {
                                radius: 8,
                                color: '#1e40af',
                                fillColor: '#3b82f6',
                                fillOpacity: 0.8,
                                weight: 2
                            })
                            .addTo(map)
                            .bindPopup("<b>Site :</b> " + nomSite);
                        }
                    });
                },
                error: function(err) {
                    console.error("Erreur lors de la lecture du CSV :", err);
                }
            });
        }

        // Lancement de la lecture dès que la page est prête
        window.onload = chargerPointsCSV;

        // --- OPTIONNEL : GEOLOCALISATION ---
        map.locate({setView: false, watch: true, enableHighAccuracy: true});
        
        var userIcon = L.circleMarker([0,0], {radius: 5, color: 'red', fillColor: 'red', fillOpacity: 1});
        
        map.on('locationfound', function(e) {
            userIcon.setLatLng(e.latlng).addTo(map);
        });
    </script>
</body>
</html>
